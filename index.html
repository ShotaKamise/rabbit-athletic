<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>ぴょんぴょんラビット</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2b3a67">

<style>
  :root{
    --shell:#2b3a67;      /* ガラケー筐体ネイビー */
    --shell-hi:#46578f;
    --bezel:#11182e;
    --lcd-off:#9db38a;
    --key:#e8e4d8;
    --accent:#ff8fb1;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(circle at 30% 20%, #fdf6e3 0%, #f3e7cf 45%, #e5d3b3 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",monospace,sans-serif;
    touch-action:manipulation;overflow:hidden;
  }
  .phone{
    background:linear-gradient(160deg,var(--shell-hi),var(--shell));
    border-radius:26px;
    padding:14px 14px 10px;
    box-shadow:0 18px 40px rgba(43,58,103,.45), inset 0 1px 0 rgba(255,255,255,.35);
    display:flex;flex-direction:column;align-items:center;gap:8px;
    user-select:none;
  }
  .antenna{
    width:8px;height:26px;border-radius:4px 4px 2px 2px;
    background:linear-gradient(#6d7cae,#39466f);
    align-self:flex-end;margin:-30px 6px 4px 0;
    box-shadow:0 2px 4px rgba(0,0,0,.3);
  }
  .brand{
    color:#cdd6f0;font-size:10px;letter-spacing:.35em;font-weight:700;
  }
  .bezel{
    background:var(--bezel);border-radius:14px;padding:10px;
    box-shadow:inset 0 3px 8px rgba(0,0,0,.6);
  }
  canvas{
    display:block;image-rendering:pixelated;image-rendering:crisp-edges;
    background:var(--lcd-off);
    border-radius:4px;
    /* 内部解像度は240pxのまま、表示だけ拡大 */
    width:min(86vw, 62vh, 420px);
    height:min(86vw, 62vh, 420px);
  }
  .keys{
    display:flex;align-items:center;gap:18px;margin-top:2px;padding:4px 6px 6px;
  }
  .dpad{display:flex;gap:22px;}
  /* すべてのボタン共通: 文字選択・長押しメニュー・スクロール横取りを無効化 */
  button{
    user-select:none; -webkit-user-select:none; -moz-user-select:none;
    -webkit-touch-callout:none; touch-action:none;
  }
  button.key{
    border:none;border-radius:12px;cursor:pointer;
    background:linear-gradient(#fbf8ef,var(--key));
    box-shadow:0 4px 0 #b9b3a0, 0 6px 8px rgba(0,0,0,.25);
    font-size:20px;font-weight:700;color:#3a3a3a;
    width:58px;height:48px;
    transition:transform .04s, box-shadow .04s;
  }
  button.key:active, button.key.pressed{
    transform:translateY(3px);
    box-shadow:0 1px 0 #b9b3a0, 0 2px 4px rgba(0,0,0,.25);
  }
  button.jump{
    width:78px;height:56px;border-radius:50%;
    background:linear-gradient(#ffc2d4,var(--accent));
    box-shadow:0 5px 0 #c9607f, 0 7px 10px rgba(0,0,0,.3);
    color:#5c1830;font-size:13px;letter-spacing:.1em;
  }
  button.jump:active, button.jump.pressed{
    transform:translateY(3px);
    box-shadow:0 1px 0 #c9607f, 0 2px 4px rgba(0,0,0,.3);
  }
  .hint{color:#aab6da;font-size:10px;letter-spacing:.08em;}
  #btnM{
    margin-left:8px;width:22px;height:22px;border-radius:50%;
    border:none;cursor:pointer;font-size:12px;
    background:linear-gradient(#ffe9a8,#ffd23f);color:#5c4300;
    box-shadow:0 2px 0 #b28f14;vertical-align:middle;
  }
  #btnM.off{filter:grayscale(1);opacity:.5;}
  @media (max-height:820px){
    .phone{transform:scale(.92);}
  }
  @media (max-height:680px){
    .phone{transform:scale(.82);}
  }

<body>
<div class="phone">
  <div class="antenna"></div>
  <div class="brand">PYON-PHONE 501i <button id="btnM" title="BGM ON/OFF">♪</button></div>
  <div class="bezel"><canvas id="lcd" width="240" height="240"></canvas></div>
  <div class="keys">
    <div class="dpad">
      <button class="key" id="btnL">◀</button>
      <button class="key" id="btnR">▶</button>
    </div>
    <button class="key jump" id="btnJ">ジャンプ</button>
  </div>
  <div class="hint">←→移動 / Z・スペース:ジャンプ / R:やりなおし・セレクト / M:BGM</div>
</div>

   タイル凡例:
     #  地面ブロック      =  レンガ足場
     B  青ブロック(乗ると一定時間で消える)
     R  赤スイッチ(乗るとT/tブロックが入れ替わる)
     T  切替ブロック(最初は実体あり)
     t  切替ブロック(最初は実体なし)
     F  炎  W  水  V  トリ  G  ゴールの旗  P  スタート地点

/* ---------- 入力 ---------- */
const input = {left:false,right:false,jump:false,jumpEdge:false,jumpBuf:0};
const JUMP_BUFFER = 7; // 着地直前に押しても数フレームは受け付ける
function pressJump(){
  if(!input.jump) input.jumpBuf = JUMP_BUFFER; // 押した瞬間だけバッファに記憶
  input.jump = true;
}
// タップで文字が選択されるのを保険で解除
document.querySelector(".phone").addEventListener("selectstart", e=>e.preventDefault());
function clearSel(){ const s=window.getSelection && window.getSelection(); if(s && s.removeAllRanges) s.removeAllRanges(); }

function bindHold(el, prop){
  const on = e=>{
    e.preventDefault(); clearSel();
    if(game.state==="select"){
      if(prop==="left") moveSel(-1);
      else if(prop==="right") moveSel(1);
      else if(prop==="jump") chooseSel();
      return;
    }
    if(prop==="jump") pressJump();
    else input[prop]=true;
    el.classList.add("pressed");
  };
  const off= e=>{e.preventDefault(); input[prop]=false; el.classList.remove("pressed");};
  el.addEventListener("pointerdown",on);
  el.addEventListener("pointerup",off);
  el.addEventListener("pointerleave",off);
  el.addEventListener("pointercancel",off);
}
bindHold(document.getElementById("btnL"),"left");
bindHold(document.getElementById("btnR"),"right");
bindHold(document.getElementById("btnJ"),"jump");
addEventListener("keydown",e=>{
  if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," ","z","Z","r","R","m","M"].includes(e.key)) e.preventDefault();
  if(e.key==="m"||e.key==="M"){ BGM.toggle(); return; }
  // ステージセレクト操作
  if(game.state==="select"){
    if(e.key==="ArrowLeft") moveSel(-1);
    else if(e.key==="ArrowRight") moveSel(1);
    else if(e.key==="ArrowUp") moveSel(-SEL_COLS);
    else if(e.key==="ArrowDown") moveSel(SEL_COLS);
    else if(e.key===" "||e.key==="z"||e.key==="Z"||e.key==="Enter") chooseSel();
    return;
  }
  if(e.key==="ArrowLeft") input.left=true;
  if(e.key==="ArrowRight") input.right=true;
  if(e.key==="ArrowUp"||e.key===" "||e.key==="z"||e.key==="Z") pressJump();
  if(e.key==="r"||e.key==="R"){
    if(game.state==="play") killPlayer(true);
    else enterSelect();               // タイトル/クリア画面などからセレクトへ
  }
  if(game.state!=="play" && (e.key===" "||e.key==="z"||e.key==="Z"||e.key==="Enter")) advance();
});
addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft") input.left=false;
  if(e.key==="ArrowRight") input.right=false;
  if(e.key==="ArrowUp"||e.key===" "||e.key==="z"||e.key==="Z") input.jump=false;
});
function canvasPos(e){
  const r=cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)/r.width*240, y:(e.clientY-r.top)/r.height*240 };
}
cv.addEventListener("pointerdown",e=>{
  if(game.state==="select"){
    const p=canvasPos(e);
    for(let i=0;i<LEVELS.length;i++){
      const r=cellRect(i);
      if(p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h){ game.selCursor=i; chooseSel(); return; }
    }
    return;
  }
  if(game.state!=="play") advance();
});

/* ---------- サウンド(短いビープ) ---------- */
let AC=null;
function beep(freq,dur,type="square",vol=.06){
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
    o.connect(g).connect(AC.destination);
    o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}


function ensureAC(){
  AC = AC || new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==="suspended") AC.resume();
  return AC;
}
/* ---------- BGM(チップチューン風ループ) ---------- */
const BGM = (()=>{
  let on=true, playing=false, timer=null, nextT=0, step=0, bar=0;
  const TEMPO=138, SPB=60/TEMPO/2; // 8分音符1つの長さ
  const N=n=>440*Math.pow(2,(n-69)/12);
  // C - Am - F - G のかんたん進行 (0=休符)
  const melA=[76,0,79,76, 84,0,79,0, 81,79,76,74, 72,0,74,76,
              77,76,74,72, 79,0,76,0, 74,72,71,72, 74,0,0,0];
  const melB=[72,0,76,0, 79,76,84,0, 83,81,79,77, 76,0,74,0,
              72,74,76,77, 79,0,81,79, 76,74,72,0, 72,0,0,0];
  const bass=[48,0,48,55, 45,0,45,52, 41,0,41,48, 43,0,50,55];
  function tone(t,f,dur,type,vol){
    try{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type=type;o.frequency.value=f;
      g.gain.setValueAtTime(vol,t);
      g.gain.exponentialRampToValueAtTime(.001,t+dur);
      o.connect(g).connect(AC.destination);
      o.start(t);o.stop(t+dur);
    }catch(e){}
  }
  function tick(){
    if(!AC) return;
    while(nextT < AC.currentTime + .15){
      if(on){
        const seq=(bar%2===0)?melA:melB;
        const m=seq[step%32];
        if(m) tone(nextT,N(m),SPB*.85,"square",.026);
        if(step%2===0){
          const b=bass[(step>>1)%16];
          if(b) tone(nextT,N(b),SPB*1.5,"triangle",.055);
        }
        if(step%4===2) tone(nextT,6200,.03,"square",.012); // ハイハット風
      }
      step++; if(step%32===0) bar++;
      nextT+=SPB;
    }
  }
  return{
    start(){
      ensureAC();
      if(playing) return;
      playing=true; nextT=AC.currentTime+.05; step=0; bar=0;
      timer=setInterval(tick,40);
    },
    toggle(){
      on=!on;
      document.getElementById("btnM").classList.toggle("off",!on);
      if(on && !playing) this.start();
      return on;
    },
  };
})();
document.getElementById("btnM").addEventListener("pointerdown",e=>{e.preventDefault();BGM.toggle();beep(880,.05);});

/* ---------- ゲーム状態 ---------- */
const game = {
  state:"title",   // title | select | play | dead | clear | allclear
  stage:0, deaths:0, frames:0, stageFrames:0,
  bestClear:{},
  unlocked:0,      // あそべる最大ステージindex (0=ステージ1のみ)
  selCursor:0,     // セレクト画面のカーソル位置
};
/* ---------- 進行状況の保存(GitHub Pagesなどのhttpで有効) ---------- */
const SAVE_KEY="pyonrabi_save_v1";
function loadSave(){
  try{
    const s=JSON.parse(localStorage.getItem(SAVE_KEY));
    if(s){ game.unlocked=s.unlocked||0; game.bestClear=s.bestClear||{}; }
  }catch(e){}
}
function persist(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({unlocked:game.unlocked, bestClear:game.bestClear}));
  }catch(e){}
}
let grid=[], gw=0, gh=0, birds=[], blues=[], switches=[], toggleOn=true;
let spawn={x:0,y:0}, goal={x:0,y:0};
const player={x:0,y:0,vx:0,vy:0,w:11,h:13,onGround:false,face:1,coyote:0,dead:0,anim:0};
let cam=0, deadTimer=0, clearTimer=0;

function loadStage(n){
  const rows = LEVELS[n].map;
  gh = rows.length; gw = rows[0].length;
  grid = []; birds=[]; blues=[]; switches=[]; toggleOn=true;
  for(let y=0;y<gh;y++){
    grid[y]=[];
    for(let x=0;x<gw;x++){
      let c = rows[y][x] || " ";
      if(c==="P"){ spawn={x:x*TILE+2,y:y*TILE+2}; c=" "; }
      if(c==="G"){ goal={x,y}; }
      if(c==="V"){ birds.push({x:x*TILE,y:y*TILE,ox:x*TILE,dir:1,t:Math.random()*99}); c=" "; }
      if(c==="B"){ blues.push({x,y,timer:-1,gone:false}); }
      if(c==="R"){ switches.push({x,y,cool:0}); }
      grid[y][x]=c;
    }
  }
  respawn();
  game.stageFrames=0;
}
function respawn(){
  player.x=spawn.x; player.y=spawn.y;
  player.vx=0; player.vy=0; player.onGround=false; player.face=1; player.coyote=0;
  blues.forEach(b=>{b.timer=-1;b.gone=false;});
  toggleOn=true;
  switches.forEach(s=>s.cool=0);
  cam = Math.max(0, Math.min(player.x - VW*TILE/2, gw*TILE - VW*TILE));
}

function tileAt(tx,ty){
  if(tx<0||tx>=gw||ty<0) return "#"; // 端は壁
  if(ty>=gh) return "W";
  return grid[ty][tx];
}
function solidAt(tx,ty){
  const c = tileAt(tx,ty);
  if(c==="#"||c==="="||c==="R") return true;
  if(c==="T") return toggleOn;
  if(c==="t") return !toggleOn;
  if(c==="B"){
    const b = blues.find(b=>b.x===tx&&b.y===ty);
    return b && !b.gone;
  }
  return false;
}
function hazardAt(tx,ty){
  const c = tileAt(tx,ty);
  return c==="F"||c==="W";
}

/* ---------- 更新 ---------- */
function killPlayer(silent){
  if(game.state!=="play") return;
  game.state="dead"; deadTimer=0; game.deaths++;
  if(!silent) beep(160,.25,"sawtooth",.09);
  beep(110,.35,"sawtooth",.07);
}
function stageClear(){
  game.state="clear"; clearTimer=0;
  const t = game.stageFrames;
  if(!(game.stage in game.bestClear) || t < game.bestClear[game.stage]) game.bestClear[game.stage]=t;
  if(game.stage+1 < LEVELS.length) game.unlocked = Math.max(game.unlocked, game.stage+1);
  persist();
  [660,880,990,1320].forEach((f,i)=>setTimeout(()=>beep(f,.12,"square",.07),i*110));
}
/* ---------- ステージセレクト ---------- */
const SEL_COLS=5, SEL_MX=14, SEL_TOP=74, SEL_GAP=6, SEL_ROWGAP=16, SEL_CH=50;
function cellRect(i){
  const col=i%SEL_COLS, row=(i/SEL_COLS)|0;
  const cw=(240-SEL_MX*2-SEL_GAP*(SEL_COLS-1))/SEL_COLS;
  return { x:SEL_MX+col*(cw+SEL_GAP), y:SEL_TOP+row*(SEL_CH+SEL_ROWGAP), w:cw, h:SEL_CH };
}
function enterSelect(){
  game.state="select";
  game.selCursor=Math.min(game.unlocked, LEVELS.length-1);
  beep(700,.06);
}
function startStage(n){
  game.stage=n; game.deaths=0; loadStage(n); game.state="play";
  beep(880,.08); BGM.start();
}
function moveSel(d){
  const n=game.selCursor+d;
  if(n<0||n>=LEVELS.length) return;
  game.selCursor=n; beep(640,.03,"square",.04);
}
function chooseSel(){
  if(game.selCursor<=game.unlocked) startStage(game.selCursor);
  else beep(170,.14,"sawtooth",.06); // まだロック中
}
function advance(){
  if(game.state==="title"){ enterSelect(); }
  else if(game.state==="clear"){
    if(game.stage+1<LEVELS.length){ startStage(game.stage+1); }
    else game.state="allclear";
  }
  else if(game.state==="allclear"){ game.state="title"; }
}

function update(){
  game.frames++;
  if(game.state==="dead"){
    deadTimer++;
    if(deadTimer>45){ game.state="play"; respawn(); }
    return;
  }
  if(game.state!=="play"){ input.jumpEdge=false; input.jumpBuf=0; return; }
  game.stageFrames++;

  // 移動
  const SPD=1.55, GRAV=0.34, JUMP=-5.9;
  if(input.left){ player.vx=-SPD; player.face=-1; }
  else if(input.right){ player.vx=SPD; player.face=1; }
  else player.vx=0;

  if(player.onGround) player.coyote=6; else if(player.coyote>0) player.coyote--;
  if(input.jumpBuf>0) input.jumpBuf--;
  if(input.jumpBuf>0 && player.coyote>0){
    player.vy=JUMP; player.onGround=false; player.coyote=0; input.jumpBuf=0;
    beep(740,.09,"square",.05);
  }
  input.jumpEdge=false;
  // 小ジャンプ(ボタンを離すと上昇が弱まる)
  if(!input.jump && player.vy<-2.2) player.vy=-2.2;
  player.vy=Math.min(player.vy+GRAV,6);

  // X軸
  player.x+=player.vx;
  let l=Math.floor(player.x/TILE), r=Math.floor((player.x+player.w-1)/TILE);
  let t=Math.floor(player.y/TILE), b=Math.floor((player.y+player.h-1)/TILE);
  if(player.vx>0){ for(let ty=t;ty<=b;ty++) if(solidAt(r,ty)){ player.x=r*TILE-player.w; break; } }
  if(player.vx<0){ for(let ty=t;ty<=b;ty++) if(solidAt(l,ty)){ player.x=(l+1)*TILE; break; } }

  // Y軸
  player.y+=player.vy;
  player.onGround=false;
  l=Math.floor(player.x/TILE); r=Math.floor((player.x+player.w-1)/TILE);
  t=Math.floor(player.y/TILE); b=Math.floor((player.y+player.h-1)/TILE);
  if(player.vy>0){
    for(let tx=l;tx<=r;tx++) if(solidAt(tx,b)){
      player.y=b*TILE-player.h; player.vy=0; player.onGround=true;
      onLand(tx,b);
    }
  }
  if(player.vy<0){
    for(let tx=l;tx<=r;tx++) if(solidAt(tx,t)){ player.y=(t+1)*TILE; player.vy=0; }
  }

  // 青ブロックのタイマー
  for(const bl of blues){
    if(bl.timer>0){ bl.timer--; if(bl.timer===0){ bl.gone=true; beep(300,.06,"triangle",.05);} }
  }
  for(const s of switches) if(s.cool>0) s.cool--;

  // トリ
  for(const bd of birds){
    bd.t++;
    bd.x += bd.dir*0.7;
    if(bd.x > bd.ox+TILE*3) bd.dir=-1;
    if(bd.x < bd.ox-TILE*3) bd.dir=1;
    bd.yy = bd.y + Math.sin(bd.t*0.12)*3;
    if(rectHit(player.x,player.y,player.w,player.h, bd.x+2,bd.yy+3,12,8)){ killPlayer(); return; }
  }

  // 危険タイル判定(当たりを少し甘めに)
  const px=player.x+2, py=player.y+2, pw=player.w-4, ph=player.h-3;
  const l2=Math.floor(px/TILE), r2=Math.floor((px+pw)/TILE);
  const t2=Math.floor(py/TILE), b2=Math.floor((py+ph)/TILE);
  for(let ty=t2;ty<=b2;ty++)for(let tx=l2;tx<=r2;tx++){
    if(hazardAt(tx,ty)){ killPlayer(); return; }
  }
  if(player.y>gh*TILE){ killPlayer(); return; }

  // ゴール
  if(rectHit(player.x,player.y,player.w,player.h, goal.x*TILE+2, goal.y*TILE, 12, TILE)){
    stageClear(); return;
  }

  // カメラ
  const target = player.x - VW*TILE/2 + player.w/2;
  cam += (target-cam)*0.15;
  cam = Math.max(0, Math.min(cam, gw*TILE - VW*TILE));

  player.anim++;
}
function onLand(tx,ty){
  const c=tileAt(tx,ty);
  if(c==="B"){
    const bl=blues.find(b=>b.x===tx&&b.y===ty);
    if(bl && !bl.gone && bl.timer<0){ bl.timer=42; }
  }
  if(c==="R"){
    const s=switches.find(s=>s.x===tx&&s.y===ty);
    if(s && s.cool===0){ s.cool=30; toggleOn=!toggleOn; beep(520,.1,"square",.06); beep(390,.1,"square",.05); }
  }
}
function rectHit(x1,y1,w1,h1,x2,y2,w2,h2){
  return x1<x2+w2 && x1+w1>x2 && y1<y2+h2 && y1+h1>y2;
}

/* ---------- 描画 ---------- */
function draw(){
  const f=game.frames;
  // 空
  const sky = cx.createLinearGradient(0,0,0,240);
  sky.addColorStop(0,"#8fd3ff"); sky.addColorStop(1,"#d8f3ff");
  cx.fillStyle=sky; cx.fillRect(0,0,240,240);

  if(game.state==="title"){ drawTitle(); return; }
  if(game.state==="select"){ drawSelect(); return; }

  // 雲(視差)
  cx.fillStyle="rgba(255,255,255,.85)";
  for(let i=0;i<5;i++){
    const cxp = ((i*97 - cam*0.3)%300+300)%300 - 30;
    const cyp = 20+i*22;
    cloud(cxp,cyp);
  }

  const ox = Math.round(cam);
  const x0=Math.floor(ox/TILE), x1=x0+VW+1;
  for(let ty=0;ty<gh;ty++)for(let tx=x0;tx<=x1;tx++){
    const c=tileAt(tx,ty), sx=tx*TILE-ox, sy=ty*TILE+(240-gh*TILE);
    drawTile(c,sx,sy,tx,ty,f);
  }
  // トリ
  for(const bd of birds){
    const sx=bd.x-ox, sy=(bd.yy||bd.y)+(240-gh*TILE);
    if(sx>-20&&sx<260) drawBird(sx,sy,bd.dir,f);
  }
  // うさぎ
  if(game.state!=="dead" || (deadTimer%8<4)){
    drawRabbit(Math.round(player.x-ox), Math.round(player.y+(240-gh*TILE)));
  }

  // HUD
  cx.fillStyle="rgba(20,30,55,.75)";
  cx.fillRect(0,0,240,14);
  cx.fillStyle="#fff"; cx.font="8px monospace"; cx.textBaseline="middle";
  cx.textAlign="left";
  cx.fillText("STAGE "+LEVELS[game.stage].name,4,8);
  cx.textAlign="right";
  cx.fillText("ミス:"+game.deaths+"  "+timeStr(game.stageFrames),236,8);
  cx.textAlign="left";

  if(game.state==="clear") drawClear();
  if(game.state==="allclear") drawAllClear();
}
function timeStr(fr){
  const s=fr/60;
  return s.toFixed(1)+"s";
}
function cloud(x,y){
  cx.beginPath();
  cx.arc(x,y,7,0,7); cx.arc(x+8,y-4,8,0,7); cx.arc(x+17,y,7,0,7);
  cx.fill();
}
function drawTile(c,sx,sy,tx,ty,f){
  if(c==="#"){
    cx.fillStyle="#7a4a21"; cx.fillRect(sx,sy,TILE,TILE);
    cx.fillStyle="#8f5a2b"; cx.fillRect(sx+2,sy+4,4,4); cx.fillRect(sx+9,sy+10,4,3);
    if(!solidAt(tx,ty-1) && tileAt(tx,ty-1)!=="#"){
      cx.fillStyle="#3fae4e"; cx.fillRect(sx,sy,TILE,5);
      cx.fillStyle="#61cf6e"; cx.fillRect(sx,sy,TILE,2);
    }
  }
  else if(c==="="){
    cx.fillStyle="#c8763a"; cx.fillRect(sx,sy,TILE,TILE);
    cx.strokeStyle="#8f4c1d"; cx.lineWidth=1;
    cx.strokeRect(sx+.5,sy+.5,TILE-1,TILE-1);
    cx.beginPath(); cx.moveTo(sx,sy+8);cx.lineTo(sx+16,sy+8);
    cx.moveTo(sx+8,sy);cx.lineTo(sx+8,sy+8); cx.stroke();
    cx.fillStyle="#e09a5e"; cx.fillRect(sx+1,sy+1,TILE-2,2);
  }
  else if(c==="B"){
    const bl=blues.find(b=>b.x===tx&&b.y===ty);
    if(bl && bl.gone) return;
    const blink = bl && bl.timer>0 && bl.timer<25 && (f%6<3);
    cx.fillStyle= blink ? "#cfeeff" : "#3d7dff";
    cx.fillRect(sx,sy,TILE,TILE);
    cx.fillStyle= blink ? "#ffffff" : "#7fb0ff";
    cx.fillRect(sx+2,sy+2,TILE-4,3);
    cx.strokeStyle="#1c48a8"; cx.strokeRect(sx+.5,sy+.5,TILE-1,TILE-1);
  }
  else if(c==="R"){
    cx.fillStyle="#e33"; cx.fillRect(sx,sy,TILE,TILE);
    cx.fillStyle="#ff8a8a"; cx.fillRect(sx+2,sy+2,TILE-4,3);
    cx.strokeStyle="#901414"; cx.strokeRect(sx+.5,sy+.5,TILE-1,TILE-1);
    cx.fillStyle="#fff"; cx.font="9px monospace"; cx.textAlign="center";
    cx.fillText("!",sx+8,sy+11); cx.textAlign="left";
  }
  else if(c==="T"||c==="t"){
    const on = (c==="T")? toggleOn : !toggleOn;
    if(on){
      cx.fillStyle="#9b59d0"; cx.fillRect(sx,sy,TILE,TILE);
      cx.fillStyle="#c79aeb"; cx.fillRect(sx+2,sy+2,TILE-4,3);
      cx.strokeStyle="#5e2e86"; cx.strokeRect(sx+.5,sy+.5,TILE-1,TILE-1);
    }else{
      cx.strokeStyle="rgba(155,89,208,.5)";
      cx.setLineDash([2,2]);
      cx.strokeRect(sx+1.5,sy+1.5,TILE-3,TILE-3);
      cx.setLineDash([]);
    }
  }
  else if(c==="F"){
    const w=Math.sin((f+tx*7)*.3)*2;
    cx.fillStyle="#ff5a1f";
    cx.beginPath();
    cx.moveTo(sx+2,sy+16); cx.quadraticCurveTo(sx+3,sy+6, sx+8+w, sy+1);
    cx.quadraticCurveTo(sx+13,sy+6, sx+14,sy+16); cx.closePath(); cx.fill();
    cx.fillStyle="#ffc61f";
    cx.beginPath();
    cx.moveTo(sx+5,sy+16); cx.quadraticCurveTo(sx+6,sy+9, sx+8-w*.5, sy+6);
    cx.quadraticCurveTo(sx+10,sy+9, sx+11,sy+16); cx.closePath(); cx.fill();
  }
  else if(c==="W"){
    cx.fillStyle="#2f6fd6"; cx.fillRect(sx,sy,TILE,TILE);
    if(tileAt(tx,ty-1)!=="W"){
      cx.fillStyle="#7db9ff";
      const w=Math.sin((f*.15)+tx)*1.5;
      cx.fillRect(sx,sy+1+w,TILE,2);
    }
  }
  else if(c==="G"){
    cx.strokeStyle="#6b4a2a"; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(sx+4,sy+16); cx.lineTo(sx+4,sy-14); cx.stroke();
    const wv=Math.sin(f*.1)*1.5;
    cx.fillStyle="#ffd23f";
    cx.beginPath();
    cx.moveTo(sx+5,sy-14); cx.lineTo(sx+15+wv,sy-10); cx.lineTo(sx+5,sy-5);
    cx.closePath(); cx.fill();
  }
}
function drawBird(x,y,dir,f){
  const flap = Math.sin(f*.35)>0;
  cx.fillStyle="#3a6ea8";
  cx.fillRect(x+3,y+4,10,6);              // 体
  cx.fillRect(x+(dir>0?11:1),y+2,4,4);    // 頭
  cx.fillStyle="#ffb02e";
  cx.fillRect(x+(dir>0?15:-1),y+3,2,2);   // くちばし
  cx.fillStyle="#274e79";
  if(flap) cx.fillRect(x+5,y+1,6,3); else cx.fillRect(x+5,y+8,6,3); // 翼
  cx.fillStyle="#fff"; cx.fillRect(x+(dir>0?12:2),y+3,1,1); // 目
}
function drawRabbit(x,y){
  const hop = player.onGround && Math.abs(player.vx)>0 && (player.anim%12<6) ? -1:0;
  y+=hop;
  cx.fillStyle="#fff";
  cx.fillRect(x+2,y+5,8,8);      // 体
  cx.fillRect(x+2,y+1,8,6);      // 頭
  cx.fillRect(x+3,y-4,2,6);      // 耳L
  cx.fillRect(x+7,y-4,2,6);      // 耳R
  cx.fillStyle="#ffc2d4";
  cx.fillRect(x+3.5,y-3,1,4); cx.fillRect(x+7.5,y-3,1,4);
  cx.fillStyle="#333";
  if(player.face>0){ cx.fillRect(x+6,y+3,1.5,2); cx.fillRect(x+9,y+3,1.5,2); }
  else { cx.fillRect(x+1.5,y+3,1.5,2); cx.fillRect(x+4.5,y+3,1.5,2); }
  cx.fillStyle="#ffc2d4";
  cx.fillRect(x+(player.face>0?8:3),y+5.5,1.5,1);   // 鼻
  cx.fillStyle="#fff";
  cx.fillRect(x+(player.face>0?0:9),y+8,3,3);       // しっぽ
  cx.fillStyle="#eee";
  cx.fillRect(x+3,y+12,3,2); cx.fillRect(x+7,y+12,3,2); // 足
}
function panel(y,h){
  cx.fillStyle="rgba(15,25,50,.85)";
  cx.fillRect(16,y,208,h);
  cx.strokeStyle="#fff"; cx.strokeRect(17.5,y+1.5,205,h-3);
}
function drawTitle(){
  const f=game.frames;
  cx.fillStyle="rgba(255,255,255,.9)";
  cloud(40,40); cloud(160,70); cloud(90,120);
  cx.fillStyle="#3fae4e"; cx.fillRect(0,200,240,40);
  cx.fillStyle="#61cf6e"; cx.fillRect(0,200,240,4);
  // 跳ねるうさぎ
  const by = 184 + Math.abs(Math.sin(f*.08))*-22;
  player.face=1; player.onGround=true; player.anim=f; player.vx=0;
  drawRabbit(112,by);
  cx.textAlign="center";
  cx.fillStyle="#1d3557"; cx.font="bold 20px sans-serif";
  cx.fillText("ぴょんぴょん",120,64);
  cx.fillText("ラビット",120,88);
  cx.font="9px monospace";
  cx.fillStyle="#456";
  cx.fillText("- じさく ガラケーふう アクション -",120,108);
  if(f%60<40){
    cx.fillStyle="#e63946"; cx.font="bold 11px sans-serif";
    cx.fillText("ジャンプボタンで ステージセレクト",120,150);
  }
  cx.textAlign="left";
}
/* ---------- ステージセレクト画面 ---------- */
function drawLock(cx0,cy0){
  cx.fillStyle="#5c6472";
  cx.fillRect(cx0-5,cy0-1,10,8);           // 本体
  cx.strokeStyle="#5c6472"; cx.lineWidth=2;
  cx.beginPath(); cx.arc(cx0,cy0-1,4,Math.PI,0); cx.stroke(); // つる
  cx.fillStyle="#2b3038"; cx.fillRect(cx0-1,cy0+2,2,3);       // 鍵穴
}
function drawSelect(){
  const f=game.frames;
  cx.fillStyle="rgba(255,255,255,.85)";
  cloud(50,30); cloud(180,52); cloud(120,150);
  cx.fillStyle="#3fae4e"; cx.fillRect(0,220,240,20);
  cx.fillStyle="#61cf6e"; cx.fillRect(0,220,240,3);

  cx.textAlign="center";
  cx.fillStyle="#1d3557"; cx.font="bold 15px sans-serif";
  cx.fillText("ステージ セレクト",120,26);
  cx.font="8px monospace"; cx.fillStyle="#456";
  cx.fillText("クリアで つぎが かいほう",120,42);

  for(let i=0;i<LEVELS.length;i++){
    const r=cellRect(i);
    const unlocked = i<=game.unlocked;
    const cleared = (i in game.bestClear);
    const sel = i===game.selCursor;
    // セル背景
    cx.fillStyle = unlocked ? (cleared ? "#ffd23f" : "#fff") : "#b9c0cc";
    roundRect(r.x,r.y,r.w,r.h,6); cx.fill();
    // カーソル枠
    if(sel){
      cx.lineWidth = 2 + (Math.sin(f*.2)+1);
      cx.strokeStyle = "#e6394f";
      roundRect(r.x-1,r.y-1,r.w+2,r.h+2,7); cx.stroke();
    }
    const midx=r.x+r.w/2;
    if(unlocked){
      cx.fillStyle="#2b3a67"; cx.font="bold 18px sans-serif";
      cx.fillText(String(i+1), midx, r.y+22);
      if(cleared){
        cx.fillStyle="#e6a100"; cx.font="9px sans-serif";
        cx.fillText("★"+timeStr(game.bestClear[i]), midx, r.y+40);
      }else{
        cx.fillStyle="#7a8699"; cx.font="8px monospace";
        cx.fillText("NEW", midx, r.y+40);
      }
    }else{
      drawLock(midx, r.y+22);
    }
  }

  cx.fillStyle="#456"; cx.font="8px monospace";
  cx.fillText("◀▶で えらぶ / ジャンプで けってい", 120, 214);
  cx.textAlign="left";
}
function roundRect(x,y,w,h,rad){
  cx.beginPath();
  cx.moveTo(x+rad,y);
  cx.arcTo(x+w,y,x+w,y+h,rad);
  cx.arcTo(x+w,y+h,x,y+h,rad);
  cx.arcTo(x,y+h,x,y,rad);
  cx.arcTo(x,y,x+w,y,rad);
  cx.closePath();
}
function drawClear(){
  clearTimer++;
  panel(84,72);
  cx.textAlign="center"; cx.fillStyle="#ffd23f";
  cx.font="bold 16px sans-serif";
  cx.fillText("ステージ クリア！",120,110);
  cx.fillStyle="#fff"; cx.font="9px monospace";
  cx.fillText("タイム "+timeStr(game.stageFrames)+"  (じこベスト "+timeStr(game.bestClear[game.stage])+")",120,128);
  if(clearTimer>30 && game.frames%50<35){
    cx.fillText(game.stage+1<LEVELS.length?"ジャンプで つぎへ  (R:セレクト)":"ジャンプで けっかへ",120,144);
  }
  cx.textAlign="left";
}
function drawAllClear(){
  panel(70,100);
  cx.textAlign="center";
  cx.fillStyle="#ffd23f"; cx.font="bold 16px sans-serif";
  cx.fillText("ぜんステージ クリア！",120,96);
  cx.fillStyle="#fff"; cx.font="10px monospace";
  cx.fillText("そう ミスかいすう: "+game.deaths,120,118);
  cx.fillStyle="#9be7ff";
  cx.fillText("うさぎは でんせつに なった…",120,136);
  if(game.frames%50<35){
    cx.fillStyle="#fff";
    cx.fillText("ジャンプで タイトルへ",120,156);
  }
  cx.textAlign="left";
  const by = 44 + Math.abs(Math.sin(game.frames*.1))*-10;
  drawRabbit(112,by);
}

/* ---------- ループ ---------- */
loadSave();
let last=0, acc=0;
function loop(t){
  requestAnimationFrame(loop);
  if(!last) last=t;
  acc += Math.min(t-last,100); last=t;
  const STEP=1000/60;
  while(acc>=STEP){ update(); acc-=STEP; }
  draw();
}
requestAnimationFrame(loop);

/* ---------- PWA: オフライン対応 ---------- */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
